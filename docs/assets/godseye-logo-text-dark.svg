<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="140" viewBox="0 0 600 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gods Eye Logo - Dark text for light backgrounds -->

  <!-- Eye symbol -->
  <g transform="translate(10, 20)">
    <!-- Outer eye shape -->
    <path d="M50 50 Q25 20 50 10 Q75 0 100 10 Q125 20 100 50 Q125 80 100 90 Q75 100 50 90 Q25 80 50 50Z" fill="none" stroke="#0D9668" stroke-width="3"/>
    <!-- Inner iris -->
    <circle cx="75" cy="50" r="22" fill="none" stroke="#0D9668" stroke-width="2.5"/>
    <!-- Pupil -->
    <circle cx="75" cy="50" r="10" fill="#0D9668"/>
    <!-- Digital scan lines -->
    <line x1="30" y1="50" x2="45" y2="50" stroke="#0D9668" stroke-width="1.5" opacity="0.6"/>
    <line x1="105" y1="50" x2="120" y2="50" stroke="#0D9668" stroke-width="1.5" opacity="0.6"/>
    <!-- Corner brackets - tech frame -->
    <path d="M20 15 L20 5 L30 5" fill="none" stroke="#0D9668" stroke-width="2" opacity="0.5"/>
    <path d="M120 5 L130 5 L130 15" fill="none" stroke="#0D9668" stroke-width="2" opacity="0.5"/>
    <path d="M20 85 L20 95 L30 95" fill="none" stroke="#0D9668" stroke-width="2" opacity="0.5"/>
    <path d="M120 95 L130 95 L130 85" fill="none" stroke="#0D9668" stroke-width="2" opacity="0.5"/>
    <!-- Radial spokes from pupil -->
    <line x1="75" y1="28" x2="75" y2="18" stroke="#0D9668" stroke-width="1" opacity="0.4"/>
    <line x1="75" y1="82" x2="75" y2="72" stroke="#0D9668" stroke-width="1" opacity="0.4"/>
    <line x1="53" y1="50" x2="58" y2="50" stroke="#0D9668" stroke-width="1" opacity="0.4"/>
    <line x1="92" y1="50" x2="97" y2="50" stroke="#0D9668" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- "GODS EYE" text -->
  <text x="160" y="75" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="800" font-size="58" letter-spacing="8" fill="#111111">GODS</text>
  <text x="370" y="75" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="800" font-size="58" letter-spacing="8" fill="#0D9668">EYE</text>

  <!-- Subtitle -->
  <text x="160" y="105" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-weight="400" font-size="14" letter-spacing="6" fill="#666666">AI GATEWAY</text>
  <text x="340" y="105" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-weight="400" font-size="14" letter-spacing="2" fill="#AAAAAA">///</text>
  <text x="370" y="105" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-weight="400" font-size="14" letter-spacing="4" fill="#666666">25+ CHANNELS</text>

  <!-- Accent line under text -->
  <rect x="160" y="115" width="80" height="2" fill="#0D9668" rx="1"/>
  <rect x="250" y="115" width="30" height="2" fill="#0D9668" opacity="0.5" rx="1"/>
  <rect x="290" y="115" width="10" height="2" fill="#0D9668" opacity="0.3" rx="1"/>
</svg>
