name: Desktop Windows Build

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Target architecture"
        required: false
        default: "x64"
        type: choice
        options:
          - x64
          - arm64

concurrency:
  group: desktop-windows-build
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "24.x"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install desktop dependencies
        shell: cmd
        run: npm install --legacy-peer-deps --prefix .

      - name: Build with electron-vite
        shell: cmd
        run: call node_modules\.bin\electron-vite.cmd build

      - name: Bundle MCP servers
        run: node scripts/build-mcp-servers.js
        continue-on-error: true

      - name: Package Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: "true"
        shell: cmd
        run: call node_modules\.bin\electron-builder.cmd --win --${{ inputs.arch || 'x64' }} --publish=never

      - name: List build output
        shell: pwsh
        run: |
          Write-Host "=== Searching for .exe and .zip files ==="
          Get-ChildItem -Path out -Recurse -File -ErrorAction SilentlyContinue | Where-Object { $_.Extension -match '\.(exe|zip|msi)$' } | ForEach-Object { Write-Host $_.FullName }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gods-eye-windows-${{ inputs.arch || 'x64' }}
          path: |
            apps/desktop/out/**/*.exe
            apps/desktop/out/**/*.zip
          retention-days: 30
          if-no-files-found: warn
