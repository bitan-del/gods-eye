<svg viewBox="0 0 150 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gods Eye Logo - Icon only -->
  <!-- Outer eye shape -->
  <path d="M50 50 Q25 20 50 10 Q75 0 100 10 Q125 20 100 50 Q125 80 100 90 Q75 100 50 90 Q25 80 50 50Z" fill="none" stroke="#1A56DB" stroke-width="4"/>
  <!-- Inner iris -->
  <circle cx="75" cy="50" r="22" fill="none" stroke="#1A56DB" stroke-width="3"/>
  <!-- Pupil -->
  <circle cx="75" cy="50" r="10" fill="#1A56DB"/>
  <!-- Digital scan lines -->
  <line x1="30" y1="50" x2="45" y2="50" stroke="#1A56DB" stroke-width="2" opacity="0.6"/>
  <line x1="105" y1="50" x2="120" y2="50" stroke="#1A56DB" stroke-width="2" opacity="0.6"/>
  <!-- Corner brackets - tech frame -->
  <path d="M20 15 L20 5 L30 5" fill="none" stroke="#1A56DB" stroke-width="2.5" opacity="0.5"/>
  <path d="M120 5 L130 5 L130 15" fill="none" stroke="#1A56DB" stroke-width="2.5" opacity="0.5"/>
  <path d="M20 85 L20 95 L30 95" fill="none" stroke="#1A56DB" stroke-width="2.5" opacity="0.5"/>
  <path d="M120 95 L130 95 L130 85" fill="none" stroke="#1A56DB" stroke-width="2.5" opacity="0.5"/>
  <!-- Radial spokes from pupil -->
  <line x1="75" y1="28" x2="75" y2="18" stroke="#1A56DB" stroke-width="1.5" opacity="0.4"/>
  <line x1="75" y1="82" x2="75" y2="72" stroke="#1A56DB" stroke-width="1.5" opacity="0.4"/>
  <line x1="53" y1="50" x2="58" y2="50" stroke="#1A56DB" stroke-width="1.5" opacity="0.4"/>
  <line x1="92" y1="50" x2="97" y2="50" stroke="#1A56DB" stroke-width="1.5" opacity="0.4"/>
</svg>
