<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="eye-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5cc"/>
      <stop offset="100%" stop-color="#0088ff"/>
    </linearGradient>
    <radialGradient id="iris-g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="60%" stop-color="#0088ff"/>
      <stop offset="100%" stop-color="#003366"/>
    </radialGradient>
  </defs>
  <!-- Outer glow -->
  <ellipse cx="60" cy="60" rx="52" ry="32" fill="url(#eye-g)" opacity="0.15"/>
  <!-- Eye shape -->
  <path d="M8 60 Q60 15 112 60 Q60 105 8 60Z" fill="url(#eye-g)" opacity="0.25"/>
  <path d="M8 60 Q60 15 112 60 Q60 105 8 60Z" stroke="url(#eye-g)" stroke-width="2.5" fill="none"/>
  <!-- Iris -->
  <circle cx="60" cy="60" r="22" fill="url(#iris-g)"/>
  <circle cx="60" cy="60" r="22" stroke="#00e5cc" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Pupil -->
  <circle cx="60" cy="60" r="10" fill="#050810"/>
  <!-- Light reflections -->
  <circle cx="53" cy="54" r="4" fill="white" opacity="0.7"/>
  <circle cx="66" cy="52" r="2" fill="white" opacity="0.4"/>
  <!-- Inner ring detail -->
  <circle cx="60" cy="60" r="16" stroke="#00e5cc" stroke-width="0.8" fill="none" opacity="0.3"/>
</svg>
